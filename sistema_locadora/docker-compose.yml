services:

  db:
    image: postgres:16-alpine
    container_name: locadora_postgres
    environment:
      POSTGRES_DB: locadora_filmes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: locadora123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d locadora_filmes"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: locadora_app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/locadora_filmes
      DB_USERNAME: postgres
      DB_PASSWORD: locadora123
      UPLOAD_DIR: /app/uploads/covers
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
